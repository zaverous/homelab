# Proves the DNS-01 solver actually works (Cloudflare token permissions, zone
# ownership) before anything depends on cert-manager for real. Staging issuer,
# so the resulting cert is untrusted by browsers - that's expected and fine.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-test
  namespace: default
spec:
  secretName: cert-test-tls
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  dnsNames:
    - cert-test.zaverous.com
