apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: noc-port-forward
  namespace: headlamp
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: noc-port-forward
  namespace: headlamp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: noc-port-forward
subjects:
  - kind: ServiceAccount
    name: noc-port-forward
    namespace: headlamp
