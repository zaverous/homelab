# LAN-only read-only cluster UI. Local DNS points this name at the HP node.
# K3s' service load balancer SNATs LAN requests through the pod and service
# CIDRs, so the middleware trusts the home subnet and both forwarding paths.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: headlamp
spec:
  ipAllowList:
    sourceRange:
      - 192.168.1.0/24
      - 10.42.0.0/16
      - 10.43.0.0/16
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp-lan
  namespace: headlamp
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`headlamp.home.arpa`)
      middlewares:
        - name: lan-only
      services:
        - name: headlamp
          port: 80
