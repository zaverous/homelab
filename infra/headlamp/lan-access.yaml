# LAN-only read-only cluster UI. Local DNS points this name at the HP node;
# Traefik rejects requests originating outside the trusted home subnet.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: headlamp
spec:
  ipAllowList:
    sourceRange:
      - 192.168.1.0/24
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp-lan
  namespace: headlamp
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`headlamp.home.arpa`)
      middlewares:
        - name: lan-only
      services:
        - name: headlamp
          port: 80
