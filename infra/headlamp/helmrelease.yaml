apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
  values:
    replicaCount: 1
    config:
      # NOC mode: authenticate every visitor as the pod's ServiceAccount, so the
      # kiosk needs no token login. Headlamp remains a ClusterIP and its Traefik
      # route accepts only the trusted LAN; the SA is bound
      # to the read-only `view` role below — the screen can inspect, never mutate.
      unsafeUseServiceAccountToken: true
    clusterRoleBinding:
      create: true
      clusterRoleName: view        # built-in read-only role (NOT cluster-admin)
    service:
      type: ClusterIP
      port: 80
    # Pin to the amd64 high-power node (debian-server-hp) - the same box that drives
    # the physical kiosk screen.
    nodeSelector:
      hardware-tier: high-power
    resources:
      requests: {cpu: 25m, memory: 64Mi}
      limits:   {cpu: 300m, memory: 192Mi}
