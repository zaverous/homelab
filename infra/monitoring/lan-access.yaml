# LAN-only Grafana route. K3s' service load balancer SNATs LAN requests through
# the pod and service CIDRs, so the middleware trusts both forwarding paths.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: monitoring
spec:
  ipAllowList:
    sourceRange:
      - 192.168.1.0/24
      - 10.42.0.0/16
      - 10.43.0.0/16
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-lan
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`grafana.home.arpa`)
      middlewares:
        - name: lan-only
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
