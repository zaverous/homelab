apiVersion: v1
kind: ConfigMap
metadata:
  name: kubepets-noc-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kubepets-noc.json: |-
    {
      "annotations": {"list": []},
      "editable": false,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 3}, {"color": "red", "value": 5}]}}, "overrides": []},
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {"colorMode": "background", "graphMode": "area", "justifyMode": "center", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"expr": "kube_deployment_status_replicas{namespace=\"kubepets\",deployment=\"kubepets-worker\"}", "legendFormat": "workers", "refId": "A"}],
          "title": "Worker replicas",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 3}]}}, "overrides": []},
          "gridPos": {"h": 8, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {"colorMode": "background", "graphMode": "area", "justifyMode": "center", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"expr": "sum(kube_pod_container_status_last_terminated_reason{namespace=\"kubepets\",reason=\"OOMKilled\"})", "legendFormat": "OOMKilled", "refId": "A"}],
          "title": "Last termination: OOMKilled",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
          "targets": [{"expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"kubepets\"}[$__rate_interval]))", "legendFormat": "{{pod}}", "refId": "A"}],
          "title": "KubePets restarts",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"max": 100, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 75}, {"color": "red", "value": 90}]}, "unit": "percent"}, "overrides": []},
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {"minVizHeight": 75, "minVizWidth": 75, "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": false, "showThresholdMarkers": true},
          "targets": [{"expr": "100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * on(instance) group_left(nodename) node_uname_info{nodename=\"worker-node-01\"}", "legendFormat": "Pi 3B", "refId": "A"}],
          "title": "Pi 3B memory pressure",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 8},
          "id": 5,
          "options": {"legend": {"calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
          "targets": [{"expr": "keda_scaler_metrics_value{namespace=\"kubepets\",scaledObject=\"kubepets-worker\"}", "legendFormat": "queue depth", "refId": "A"}],
          "title": "Hunger queue depth (KEDA scaler)",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 41,
      "tags": ["kubepets", "noc", "phase-5a"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "timezone": "browser",
      "title": "KubePets NOC",
      "uid": "kubepets-noc",
      "version": 1
    }
