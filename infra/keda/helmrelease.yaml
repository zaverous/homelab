apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  interval: 1h
  chart:
    spec:
      chart: keda
      version: "2.20.1"
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: keda
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # Keep KEDA's three components (operator, metrics-apiserver, admission
    # webhooks) on the amd64 high-power node (debian-server-hp). The Pi 5 stays
    # reserved for the datastore; the Pi 3B is the tier we deliberately break, so
    # nothing infra-critical should run there.
    nodeSelector:
      hardware-tier: high-power
    # This cluster's only StorageClass is node-local; KEDA is stateless, no PVCs.
    resources:
      operator:
        requests: {cpu: 50m, memory: 64Mi}
        limits:   {cpu: 500m, memory: 256Mi}
      metricServer:
        requests: {cpu: 50m, memory: 64Mi}
        limits:   {cpu: 500m, memory: 256Mi}
      webhooks:
        requests: {cpu: 25m, memory: 32Mi}
        limits:   {cpu: 200m, memory: 128Mi}
