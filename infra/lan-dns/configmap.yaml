apiVersion: v1
kind: ConfigMap
metadata:
  name: lan-coredns
  namespace: lan-dns
data:
  Corefile: |
    .:53 {
        # Bind only the node's LAN address. This avoids colliding with a local
        # stub resolver listening on 127.0.0.53.
        bind {$NODE_IP}

        # Never become an open resolver if the host is exposed accidentally.
        acl {
            allow net 192.168.1.0/24
            allow net 127.0.0.0/8
            block
        }

        hosts {
            192.168.1.134 headlamp.home.arpa
            192.168.1.134 grafana.home.arpa
            fallthrough
        }

        forward . 192.168.1.1
        cache 300
        errors
        health :8080
        ready :8181
        reload
    }
