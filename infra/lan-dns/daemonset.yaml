apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lan-coredns
  namespace: lan-dns
spec:
  selector:
    matchLabels:
      app: lan-coredns
  template:
    metadata:
      labels:
        app: lan-coredns
    spec:
      hostNetwork: true
      dnsPolicy: Default
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - debian-server-hp
                      - control-plane-01
      tolerations:
        - operator: Exists
      containers:
        - name: coredns
          image: registry.k8s.io/coredns/coredns:v1.13.1
          args:
            - -conf
            - /etc/coredns/Corefile
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - name: dns-udp
              containerPort: 53
              hostPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              hostPort: 53
              protocol: TCP
          readinessProbe:
            httpGet:
              host: 127.0.0.1
              path: /ready
              port: 8181
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              host: 127.0.0.1
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: lan-coredns
