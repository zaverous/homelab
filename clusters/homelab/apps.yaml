# Tells Flux to also reconcile ./apps/hello-flux-test, separate from the
# flux-system bootstrap files that live alongside this in clusters/homelab/.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./apps/hello-flux-test
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
