# ClusterIssuer + Cloudflare token + a test Certificate. dependsOn cert-manager
# so its CRDs (ClusterIssuer, Certificate) definitely exist before these apply.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-config
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
  interval: 10m0s
  path: ./infra/cert-manager-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
