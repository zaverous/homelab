# Outbound-only Cloudflare Tunnel connector. Public hostname (homelab.zaverous.com)
# -> Traefik routing is configured in Cloudflare's dashboard (Public Hostname),
# not here - this Kustomization only gets the connector itself running and
# authenticated.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflared
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infra/cloudflared
  prune: true
  wait: true
  timeout: 3m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
