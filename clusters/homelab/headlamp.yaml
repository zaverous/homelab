# Phase 5a: Headlamp - a lightweight read-only Kubernetes UI for the physical NOC
# kiosk on debian-server-hp. No secrets, so no SOPS decryption. Its Service stays
# ClusterIP; Traefik exposes a source-IP-allowlisted route to the trusted LAN.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 30m0s
  path: ./infra/headlamp
  prune: true
  wait: true
  timeout: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
