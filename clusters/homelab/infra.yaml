# Separate from apps.yaml: holds infra-level pieces (secrets, cert-manager,
# cloudflared) that need SOPS decryption, as opposed to plain application workloads.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./infra
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
