# Phase 4e observability: kube-prometheus-stack (Prometheus + Grafana +
# kube-state-metrics + node-exporter; Alertmanager disabled). Carries SOPS
# decryption for the Grafana admin Secret - same pattern as kubepets /
# cert-manager-config. `wait: false`: nothing dependsOn monitoring, and the big
# chart's first install is slow, so don't let the Kustomization flap on it - the
# HelmRelease tracks its own readiness. (Phase 4e)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 30m0s
  path: ./infra/monitoring
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
