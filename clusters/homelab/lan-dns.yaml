# Redundant LAN DNS on the HP and Pi 5 nodes. The router advertises both node
# addresses over DHCP after this Kustomization is healthy.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: lan-dns
  namespace: flux-system
spec:
  interval: 30m0s
  path: ./infra/lan-dns
  prune: true
  wait: true
  timeout: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
