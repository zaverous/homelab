# Installs the KEDA operator (event-driven autoscaler) via Helm. No secrets, so
# no decryption. The kubepets-autoscale Kustomization dependsOn this so KEDA's
# CRDs (ScaledObject) exist before the worker's ScaledObject is applied - same
# operator/config split as cert-manager vs cert-manager-config. (ADR-006)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keda
  namespace: flux-system
spec:
  interval: 30m0s
  path: ./infra/keda
  prune: true
  wait: true
  timeout: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
