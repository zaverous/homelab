name: Build and push kubepets-worker

on:
  push:
    branches: [master]
    paths:
      - "apps/kubepets/worker/**"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (arm64 + amd64)
        uses: docker/build-push-action@v6
        with:
          context: apps/kubepets/worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/kubepets-worker:latest
            ghcr.io/${{ github.repository }}/kubepets-worker:${{ github.sha }}
