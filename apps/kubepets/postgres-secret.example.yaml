# TEMPLATE ONLY — do NOT commit this file as-is (it is plaintext).
# Steps:
#   1. copy it:   cp postgres-secret.example.yaml secret.enc.yaml
#   2. set a real password in secret.enc.yaml
#   3. encrypt in place (the .sops.yaml rule already matches *.enc.yaml):
#        sops --encrypt --in-place apps/kubepets/secret.enc.yaml
#   4. uncomment "- secret.enc.yaml" in kustomization.yaml, then commit.
# Until the encrypted secret exists, postgres-0 will sit Pending on its secret.
apiVersion: v1
kind: Secret
metadata:
  name: kubepets-db
  namespace: kubepets
type: Opaque
stringData:
  POSTGRES_USER: kubepets
  POSTGRES_DB: kubepets
  POSTGRES_PASSWORD: CHANGE_ME_then_sops_encrypt
