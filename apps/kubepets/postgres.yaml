# PostgreSQL — persistent KubePets pet state (owner, health, hunger).
# PINNED to control-plane-01 (Pi 5): it is the only node with an NVMe disk, and
# local-path storage is node-local — the data physically lives on whichever node
# this schedules onto, so we choose the fast, reliable one on purpose (ADR-005).
# control-plane-01 is untainted, so no toleration is needed here.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kubepets
  labels: {app: postgres}
spec:
  clusterIP: None            # headless — stable DNS for the StatefulSet pod
  selector: {app: postgres}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: kubepets
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: {app: postgres}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["control-plane-01"]   # Pi 5, NVMe
      containers:
        - name: postgres
          image: postgres:17-alpine               # multi-arch, arm64-ready
          ports:
            - {containerPort: 5432, name: postgres}
          env:
            - name: POSTGRES_USER
              valueFrom: {secretKeyRef: {name: kubepets-db, key: POSTGRES_USER}}
            - name: POSTGRES_DB
              valueFrom: {secretKeyRef: {name: kubepets-db, key: POSTGRES_DB}}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: kubepets-db, key: POSTGRES_PASSWORD}}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata   # subdir of the mount
          resources:
            requests: {cpu: 250m, memory: 256Mi}
            limits:   {cpu: 500m, memory: 512Mi}
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "kubepets"]}   # matches POSTGRES_USER
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec: {command: ["pg_isready", "-U", "kubepets"]}
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi
