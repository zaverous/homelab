# Plaintext TEMPLATE for the OAuth secret - never referenced by kustomize and
# never committed with real values. The real secret lives SOPS-encrypted in
# oauth-secret.enc.yaml (JWT_SECRET is already a real random value; the Google
# pair stays REPLACE_ME until an OAuth client exists in Google Cloud Console:
# APIs & Services -> Credentials -> OAuth client ID (web application), with
# authorized redirect URI https://kubepets.zaverous.com/api/auth/callback).
# To update: sops apps/kubepets/oauth-secret.enc.yaml  (edits in place)
apiVersion: v1
kind: Secret
metadata:
  name: kubepets-oauth
  namespace: kubepets
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: REPLACE_ME.apps.googleusercontent.com
  GOOGLE_CLIENT_SECRET: REPLACE_ME
  JWT_SECRET: REPLACE_ME_64_hex_chars
