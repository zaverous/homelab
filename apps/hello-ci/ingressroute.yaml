# Full (strict) TLS (ADR-004): Traefik serves the real Let's Encrypt cert
# (see certificate.yaml) on websecure, so cloudflared -> Traefik is genuinely
# encrypted end-to-end, not just terminated at Cloudflare's edge. Requires the
# Cloudflare Tunnel's Public Hostname to be switched to service type HTTPS
# (see infra/cloudflared - that mapping lives in Cloudflare's dashboard, not git).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hello-ci
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`homelab.zaverous.com`)
      kind: Rule
      services:
        - name: hello-ci
          port: 80
  tls:
    secretName: homelab-zaverous-com-tls
