# LimitRange — per-container defaults and min/max bounds for the `default` namespace.
# Any container that omits requests/limits gets defaultRequest/default applied.
# Containers outside [min, max] are rejected at admission time.
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: default
spec:
  limits:
    - type: Container
      defaultRequest: {cpu: 100m, memory: 128Mi}
      default:        {cpu: 500m, memory: 512Mi}
      min:            {cpu: 10m,  memory: 16Mi}
      max:            {cpu: "1",  memory: 1Gi}
---
# ResourceQuota — namespace-wide ceiling on total requests/limits and pod count.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: default-quota
  namespace: default
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 3Gi
    pods: "20"
